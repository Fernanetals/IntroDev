<div>
    <input type="text"
           placeholder="Buscar..."
           name="busca"
           value="{{ busca }}"
           hx-get="/lista"
           hx-target="#lista"
           hx-trigger="input changed delay:500ms"
           hx-select="#lista">

    <span id="indicator" class="htmx-indicator">
        Carregando...
    </span>
</div>

<div id="lista">

    <ul>
        {% for aluno in alunos %}
            <li>{{ aluno.id }} {{ aluno.nome }}</li>
        {% else %}
            <li>Não há alunos</li>
        {% endfor %}
    </ul>

    <div style="margin-top:10px">

        <button
            hx-get="/lista?busca={{ busca }}&page={{ page-1 }}"
            hx-target="#lista"
            hx-select="#lista"
            {% if page == 0 %}disabled{% endif %}
        >
            Anterior
        </button>

        <span>Página {{ page + 1 }}</span>

        <button
            hx-get="/lista?busca={{ busca }}&page={{ page+1 }}"
            hx-target="#lista"
            hx-select="#lista"
        >
            Próxima
        </button>

    </div>

</div>
