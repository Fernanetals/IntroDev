<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Aula 8</title>
        <link rel="stylesheet" href="/static/jupiter.css">
        <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.js" integrity="sha384-ezjq8118wdwdRMj+nX4bevEi+cDLTbhLAeFF688VK8tPDGeLUe0WoY2MZtSla72F" crossorigin="anonymous"></script>
        <style>
            nav button{
                padding:10px;
                margin:5px;
            }

            .ativo{
                background-color:#444;
                color:white;
            }
        </style>

    </head>
    <body>

        <h1>Meu Site</h1>

        <nav>
            <button hx-get="/curtidas"
                    hx-target="main"
                    hx-push-url="true">
            Curtidas
            </button>

            <button hx-get="/jupiter"
                    hx-target="main"
                    hx-push-url="true">
            Jupiter
            </button>

            <button hx-get="/professor"
                    hx-target="main"
                    hx-push-url="true">
            Professor
            </button>
        </nav>

        <hr>

        <main
            hx-get="{{ pagina }}"
            hx-target="main"
            hx-trigger="load"
            hx-push-url="true">
        </main>

        <div 
            hx-get="/jupiter"
            hx-target="main"
            hx-trigger="keyup[shiftKey&&altKey&&(key=='P'||key=='p')] from:body">
        </div>

        <script src="./jupiter.js">
        
        </script>

    </body>
</html>
